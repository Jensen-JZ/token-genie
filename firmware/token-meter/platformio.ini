; TokenGenie firmware — Waveshare ESP32-S3-Touch-AMOLED-1.75
; Round 466x466 AMOLED, CO5300 (QSPI) + CST9217 touch (I2C), ESP32-S3R8 16MB/8MB-PSRAM.
;
; Uses the pioarduino platform fork (arduino-esp32 3.x) — the stock
; platformio/espressif32 only ships arduino-esp32 2.x, which the vendored
; Waveshare GFX/CO5300 libs are not built against.

[env:amoled175]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3R8: 16MB flash (QIO) + 8MB PSRAM (OPI)
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; Native USB-Serial-JTAG (no external UART chip)
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200

; Vendored offline libs (CO5300 GFX fork, SensorLib, lvgl 8.4, ...) used in place.
lib_extra_dirs = ${PROJECT_DIR}/../waveshare-ref/examples/Arduino-v3.3.5/libraries

; Registry libs (WiFi/WiFiClientSecure/HTTPClient are built into the framework).
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    tzapu/WiFiManager@^2.0.17

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I include
